version: "1.0"

source:
  schema: public

# ─────────────────────────────────────────────
# NODE DEFINITIONS
# Each Postgres table row becomes a Neo4j node
# ─────────────────────────────────────────────
nodes:

  - table: customers
    label: Customer
    id_field: customer_id
    properties:
      - name
      - email
      - phone
      - address
      - city
      - country
      - created_at
      - updated_at
    indexed_properties:
      - email
      - country
    estimated_rows: 2000000

  - table: products
    label: Product
    id_field: product_id
    properties:
      - name
      - sku
      - description
      - unit_price
      - stock_quantity
      - created_at
      - updated_at
    indexed_properties:
      - sku
    estimated_rows: 500000

  - table: categories
    label: Category
    id_field: category_id
    properties:
      - name
      - parent_category_id
    estimated_rows: 1000

  - table: suppliers
    label: Supplier
    id_field: supplier_id
    properties:
      - name
      - contact_email
      - country
      - lead_time_days
    estimated_rows: 50000

  - table: orders
    label: Order
    id_field: order_id
    properties:
      - customer_id
      - status
      - total_amount
      - currency
      - order_date
      - shipped_date
      - updated_at
    indexed_properties:
      - status
      - order_date
    estimated_rows: 10000000

  - table: employees
    label: Employee
    id_field: employee_id
    properties:
      - first_name
      - last_name
      - email
      - department_id
      - role
      - hire_date
    estimated_rows: 10000

  - table: departments
    label: Department
    id_field: department_id
    properties:
      - name
      - location
    estimated_rows: 500

  - table: invoices
    label: Invoice
    id_field: invoice_id
    properties:
      - order_id
      - amount
      - status
      - due_date
      - paid_at
    estimated_rows: 8000000

# ─────────────────────────────────────────────
# DIRECT FK RELATIONSHIPS
# One row in from_table has an FK to to_table
# ─────────────────────────────────────────────
relationships:

  - type: PLACED_BY
    from:
      table: orders
      fk: customer_id
    to:
      table: customers
      pk: customer_id
    properties: []

  - type: PROCESSED_BY
    from:
      table: orders
      fk: employee_id
    to:
      table: employees
      pk: employee_id
    properties: []

  - type: IN_CATEGORY
    from:
      table: products
      fk: category_id
    to:
      table: categories
      pk: category_id
    properties: []

  - type: SUPPLIED_BY
    from:
      table: products
      fk: supplier_id
    to:
      table: suppliers
      pk: supplier_id
    properties: []

  - type: WORKS_IN
    from:
      table: employees
      fk: department_id
    to:
      table: departments
      pk: department_id
    properties: []

  - type: GENERATED_FROM
    from:
      table: invoices
      fk: order_id
    to:
      table: orders
      pk: order_id
    properties: []

# ─────────────────────────────────────────────
# JUNCTION TABLE RELATIONSHIPS
# Many-to-many tables become relationships with properties
# ─────────────────────────────────────────────
junction_relationships:

  - type: CONTAINS
    junction_table: order_items
    from:
      table: orders
      fk: order_id
    to:
      table: products
      fk: product_id
    properties:
      - quantity
      - unit_price
      - discount

  - type: USES_CONTRACT
    junction_table: supplier_contracts
    from:
      table: suppliers
      fk: supplier_id
    to:
      table: products
      fk: product_id
    properties:
      - contract_price
      - valid_from
      - valid_to
